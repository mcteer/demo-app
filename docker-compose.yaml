services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog_app
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_app -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 5

  catalog-service:
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: catalog
      DB_USER: catalog_app
      DB_SSLMODE: disable
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
