apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: catalog
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: catalog
            - name: POSTGRES_USER
              value: catalog_app
            - name: POSTGRES_PASSWORD
              value: dev
          volumeMounts:
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "catalog_app", "-d", "catalog"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: catalog
data:
  0001_init.sql: |
    CREATE TABLE IF NOT EXISTS products (
        id          SERIAL PRIMARY KEY,
        name        TEXT NOT NULL,
        sku         TEXT NOT NULL UNIQUE,
        price_cents INTEGER NOT NULL,
        created_at  TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    INSERT INTO products (name, sku, price_cents) VALUES
        ('Field Notebook',  'FN-001', 1200),
        ('Ford Crossing Mug','FC-002', 1800),
        ('Ferryman Tee',    'FT-003', 2500)
    ON CONFLICT (sku) DO NOTHING;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: catalog
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
