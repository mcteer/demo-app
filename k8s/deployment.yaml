apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-service
  namespace: my-ns-dev
  labels:
    app: my-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-service
  template:
    metadata:
      labels:
        app: my-service
    spec:
      serviceAccountName: my-service
      containers:
        - name: my-service
          image: catalog-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # Tier-4: credentials sourced from VSO-managed Secret (no static creds in manifest)
            - name: DB_USER_FILE
              value: /vault/secrets/db/username
            - name: DB_PASSWORD_FILE
              value: /vault/secrets/db/password
            - name: DB_HOST
              value: postgres.my-ns-dev.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: catalog
            - name: DB_SSLMODE
              value: disable
            - name: PORT
              value: "8080"
          volumeMounts:
            - name: db-creds
              mountPath: /vault/secrets/db
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: db-creds
          secret:
            secretName: my-service-db
